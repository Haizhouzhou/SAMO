method: "SAMO"
evaluation:
  split: "leave_one_reader_out"
  reader_disjoint: true
residualization:
  gaze_columns:
    - "gaze_log_ms"
  covariates:
    - "lm_word_surprisal"
    - "lm_word_entropy"
    - "word_length"
    - "word_position"
profiles:
  include:
    - "lm_surprisal_exposure_mean"
    - "lm_surprisal_exposure_std"
    - "lm_entropy_exposure_mean"
    - "lm_entropy_exposure_std"
    - "residual_mean__gaze_log_ms"
    - "residual_std__gaze_log_ms"
    - "sensitivity__gaze_log_ms__surprisal"
    - "sensitivity__gaze_log_ms__entropy"
model:
  family: "logistic_regression"
  threshold: 0.5
